<!-- menu 10 ( ภาพความทรงจำ v.2 ) -->

<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyLoveweb</title>

    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Mali', cursive;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg,
                    #FFB3D1,
                    #BFE7FF,
                    #E2C6FF);
            color: #5A4B6E;
        }

        .card {
            width: 90%;
            max-width: 560px;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(10px);
            padding: 40px 25px 30px;
            text-align: center;
        }

        .title {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .subtitle {
            letter-spacing: 0.2px;
            line-height: 1.8;
            font-size: 15px;
            margin-bottom: 25px;
            opacity: 0.8;
        }

        .gallery {
            margin-top: 30px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px;
        }

        .photo {
            width: 120px;
            background: white;
            padding: 10px 10px 20px;
            border-radius: 10px;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }

        .photo img {
            width: 100%;
            height: 95px;
            object-fit: cover;
            border-radius: 6px;
        }

        .photo::before {
            content: "";
            width: 46px;
            height: 14px;
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;

            clip-path: polygon(0% 20%, 5% 0%, 10% 20%, 15% 0%, 20% 20%,
                    25% 0%, 30% 20%, 35% 0%, 40% 20%, 45% 0%,
                    50% 20%, 55% 0%, 60% 20%, 65% 0%, 70% 20%,
                    75% 0%, 80% 20%, 85% 0%, 90% 20%, 95% 0%, 100% 20%,
                    100% 80%, 95% 100%, 90% 80%, 85% 100%, 80% 80%,
                    75% 100%, 70% 80%, 65% 100%, 60% 80%, 55% 100%,
                    50% 80%, 45% 100%, 40% 80%, 35% 100%, 30% 80%,
                    25% 100%, 20% 80%, 15% 100%, 10% 80%, 5% 100%, 0% 80%);

            background-size: 6px 6px;
            background-image: repeating-linear-gradient(45deg,
                    rgba(255, 255, 255, 0.3) 0px,
                    rgba(255, 255, 255, 0.3) 2px,
                    transparent 2px,
                    transparent 6px);

            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        .photo:nth-child(1)::before {
            background-color: rgba(255, 182, 193, 0.85);
            transform: translateX(-50%) rotate(-12deg);
        }

        .photo:nth-child(2)::before {
            background-color: rgba(200, 180, 255, 0.85);
            transform: translateX(-50%) rotate(10deg);
        }

        .photo:nth-child(3)::before {
            background-color: rgba(180, 220, 255, 0.85);
            transform: translateX(-50%) rotate(-6deg);
        }

        .photo:nth-child(4)::before {
            background-color: rgba(255, 230, 170, 0.85);
            transform: translateX(-50%) rotate(8deg);
        }

        .photo:nth-child(5)::before {
            background-color: rgba(255, 200, 210, 0.85);
            transform: translateX(-50%) rotate(-9deg);
        }

        .photo:nth-child(1) {
            transform: rotate(-6deg);
        }

        .photo:nth-child(2) {
            transform: rotate(5deg);
        }

        .photo:nth-child(3) {
            transform: rotate(-4deg);
        }

        .photo:nth-child(4) {
            transform: rotate(6deg);
        }

        .photo:nth-child(5) {
            transform: rotate(-3deg);
        }

        .photo:hover {
            transform: scale(1.1) rotate(0deg);
            z-index: 3;
        }

        .popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
        }

        .popup-content {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 22px;
            width: 320px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            text-align: center;

            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            animation: popupFade 0.25s ease;
        }

        @keyframes popupFade {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .popup-content img {
            width: 100%;
            border-radius: 14px;
            margin-bottom: 12px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
        }

        .popup-text {
            margin-bottom: 15px;
            line-height: 1.7;
            font-size: 14px;
            overflow-y: auto;
        }

        .popup-content .btn {
            margin-top: 10px;
            align-self: center;
        }

        .btn {
            background-color: #8B7BAF;
            color: #FFFFFF;
            border: none;
            padding: 10px 22px;
            border-radius: 999px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.25s;
        }

        .btn:hover {
            background-color: #7A6AA0;
            transform: translateY(-2px);
        }

        @media (max-width: 360px) {
            .card {
                padding: 22px 14px 18px;
                border-radius: 18px;
            }

            .title {
                font-size: 18px;
            }

            .subtitle {
                font-size: 12px;
                margin-bottom: 18px;
            }

            .gallery {
                gap: 10px;
                margin-top: 20px;
                margin-bottom: 20px;
            }

            .photo {
                width: 85px;
                padding: 6px 6px 12px;
            }

            .photo img {
                height: 70px;
            }

            .popup-content {
                width: 90%;
                padding: 14px;
            }

            .popup-text {
                font-size: 12px;
            }

            .btn {
                font-size: 13px;
                padding: 8px 16px;
            }
        }

        @media (min-width: 361px) and (max-width: 480px) {
            .card {
                padding: 26px 18px 22px;
            }

            .title {
                font-size: 20px;
            }

            .subtitle {
                font-size: 13px;
            }

            .photo {
                width: 95px;
            }

            .photo img {
                height: 80px;
            }

            .popup-content {
                width: 300px;
            }
        }

        @media (min-width: 481px) and (max-width: 599px) {
            .card {
                max-width: 500px;
            }

            .photo {
                width: 105px;
            }

            .photo img {
                height: 85px;
            }
        }

        @media (min-width: 600px) and (max-width: 1024px) {
            .card {
                max-width: 540px;
            }

            .photo {
                width: 110px;
            }
        }

        @media (max-width: 430px) {
            .card {
                width: 92%;
            }
        }

        @media (orientation: landscape) and (max-height: 420px) {
            body {
                align-items: flex-start;
                padding: 10px 0;
            }

            .card {
                margin-top: 10px;
                padding: 16px;
            }

            .title {
                font-size: 16px;
            }

            .subtitle {
                font-size: 12px;
                margin-bottom: 15px;
            }

            .gallery {
                gap: 8px;
            }

            .photo {
                width: 75px;
            }

            .photo img {
                height: 60px;
            }

            .popup-content {
                width: 85%;
                padding: 12px;
            }

            .popup-text {
                font-size: 11px;
            }

            .btn {
                font-size: 12px;
                padding: 6px 14px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                transition: none !important;
            }
        }

        @supports (padding: env(safe-area-inset-left)) {
            body {
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="title">ความทรงจำของเรา</div>
        <div class="subtitle">กดที่รูปเพื่อดูความทรงจำ</div>

        <div class="gallery">
            <div class="photo" onclick="openPopup('img/photo6','1')">
                <img src="img/p1.jpg">
            </div>

            <div class="photo" onclick="openPopup('img/photo2.jpg','2')">
                <img src="img/p2.jpg">
            </div>

            <div class="photo" onclick="openPopup('img/photo1.jpg','3')">
                <img src="img/p3.jpg">
            </div>

            <div class="photo" onclick="openPopup('img/photo3.jpg','4')">
                <img src="img/p1.jpg">
            </div>

            <div class="photo" onclick="openPopup('img/photo5.jpg','5')">
                <img src="img/p2.jpg">
            </div>
        </div>

        <button class="btn" onclick="location.href='../menu.html'">กลับหน้าเมนู</button>
    </div>

    <div class="popup" id="popup" onclick="closePopup()">
        <div class="popup-content" onclick="event.stopPropagation()">
            <img id="popupImg">
            <div class="popup-text" id="popupText"></div>
            <button class="btn" onclick="closePopup()">ปิด</button>
        </div>
    </div>

    <script>
        function openPopup(img, text) {
            document.getElementById("popup").style.display = "flex";
            document.getElementById("popupImg").src = img;
            document.getElementById("popupText").innerText = text;
        }

        function closePopup() {
            document.getElementById("popup").style.display = "none";
        }
    </script>

</body>

</html>
