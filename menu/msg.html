<!-- menu 5 ( ข้อความน่ารักๆสำหรับคนน่่ารัก ) -->

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyLoveweb</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&family=Mali:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0; padding: 0; box-sizing: border-box;
        }

        :root {
            --rose:    #F9A8C0;
            --rose-d:  #E87FA0;
            --lilac:   #C9B6E8;
            --sky:     #A8D8F0;
            --cream:   #FFFBF5;
            --ink:     #5C4A72;
            --ink-lt:  #8B75A8;
            --line:    #E8D8F5;
            --shadow:  rgba(180,140,210,0.18);
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(160deg, #FFE8F3 0%, #EDE0FF 55%, #DDF0FF 100%);
            overflow: hidden;
            position: relative;
        }

        .blobs {
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
            overflow: hidden;
        }
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.45;
            animation: drift 12s ease-in-out infinite alternate;
        }
        .blob-1 { width:340px;height:340px;background:#F9C8DB;top:-80px;left:-80px;animation-delay:0s; }
        .blob-2 { width:280px;height:280px;background:#C5D8F9;bottom:-60px;right:-60px;animation-delay:3s; }
        .blob-3 { width:220px;height:220px;background:#D9C5F9;top:40%;left:60%;animation-delay:6s; }
        @keyframes drift {
            from { transform: translate(0,0) scale(1); }
            to   { transform: translate(20px,15px) scale(1.06); }
        }

        .card {
            position: relative; z-index: 1;
            width: 100%; max-width: 400px;
        }

        .envelope-header {
            display: flex; align-items: center; justify-content: center;
            gap: 10px;
            margin-bottom: 14px;
        }
        .wax-seal {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, var(--rose-d), #D45F85);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            box-shadow: 0 3px 10px rgba(200,80,120,0.28);
        }
        .envelope-title {
            font-family: 'Mali', cursive;
            font-size: 16px;
            color: var(--ink-lt);
            letter-spacing: 0.04em;
        }

        .notebook {
            background: white;
            border-radius: 6px 20px 20px 6px;
            box-shadow:
                -4px 0 0 0 #D8C8F0,
                -8px 0 0 0 #C8B0E0,
                0 12px 40px var(--shadow),
                0 2px 8px rgba(0,0,0,0.06);
            overflow: hidden;
            position: relative;
        }

        .rings {
            position: absolute; left: -2px; top: 0; bottom: 0;
            width: 24px;
            display: flex; flex-direction: column;
            justify-content: space-evenly; align-items: center;
            z-index: 10;
        }
        .ring {
            width: 15px; height: 15px;
            border-radius: 50%;
            background: linear-gradient(135deg, #E0CCF8, #B89ED8);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.18), 0 1px 3px rgba(0,0,0,0.10);
        }

        .pages { margin-left: 24px; }

        .page {
            display: none;
            padding: 28px 24px 64px 26px;
            min-height: 380px;
            background:
                repeating-linear-gradient(
                    to bottom,
                    transparent,
                    transparent 33px,
                    #EEE4FA 33px,
                    #EEE4FA 34px
                );
            line-height: 2.06;
            font-family: 'Sarabun', sans-serif;
            font-size: 15px;
            color: var(--ink);
            position: relative;
            animation-duration: 0.38s;
            animation-fill-mode: both;
            animation-timing-function: ease;
        }
        .page.active { display: block; }

        .page::before {
            content: "";
            position: absolute; left: 14px; top: 0; bottom: 0;
            width: 1.5px;
            background: linear-gradient(to bottom, #f9c8da, #F9A8C0, #f9c8da);
        }

        @keyframes slideRight {
            from { opacity:0; transform:translateX(36px); }
            to   { opacity:1; transform:translateX(0); }
        }
        @keyframes slideLeft {
            from { opacity:0; transform:translateX(-36px); }
            to   { opacity:1; transform:translateX(0); }
        }
        .page.flip-right { animation-name: slideRight; }
        .page.flip-left  { animation-name: slideLeft; }

        .sticker {
            font-size: 20px;
            position: absolute;
            user-select: none;
            pointer-events: none;
        }
        .sticker-tl { top: 8px; right: 16px; transform: rotate(12deg); }
        .sticker-br { bottom: 52px; right: 14px; transform: rotate(-8deg); }

        .to-label {
            font-family: 'Mali', cursive;
            font-weight: 600;
            font-size: 14px;
            color: var(--rose-d);
            display: inline-flex; align-items: center; gap: 5px;
            margin-bottom: 10px;
        }
        .page-text {
            white-space: pre-line;
            line-height: 2.06;
        }
        .from-wrap {
            margin-top: 18px;
            text-align: right;
        }
        .from-label {
            font-family: 'Mali', cursive;
            font-style: italic;
            font-size: 14px;
            color: var(--ink-lt);
            display: inline-flex; align-items: center; gap: 5px;
        }
        .page-num {
            position: absolute; bottom: 16px; right: 18px;
            font-size: 11px; color: var(--lilac);
            font-family: 'Sarabun', sans-serif;
        }

        .nav {
            display: flex; align-items: center; justify-content: center;
            gap: 14px; margin-top: 16px;
        }
        .nav-btn {
            width: 40px; height: 40px;
            border-radius: 50%; border: none;
            background: white;
            color: var(--ink-lt);
            font-size: 17px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 3px 10px var(--shadow);
            transition: all 0.2s;
            font-family: 'Mali', cursive;
        }
        .nav-btn:hover:not(:disabled) {
            background: var(--rose);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(240,130,160,0.3);
        }
        .nav-btn:disabled { opacity: 0.28; cursor: default; }
        .page-dots {
            display: flex; gap: 6px; align-items: center;
        }
        .dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--line);
            transition: all 0.25s;
        }
        .dot.active-dot {
            background: var(--rose-d);
            transform: scale(1.3);
        }

        .footer-btn {
            margin-top: 20px;
            text-align: center;
        }
        .link-btn {
            display: inline-flex; align-items: center; gap: 6px;
            background: linear-gradient(135deg, var(--rose-d), var(--lilac));
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 999px;
            font-size: 14px;
            font-family: 'Mali', cursive;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(200,140,220,0.3);
            transition: all 0.22s;
            text-decoration: none;
        }
        .link-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(200,140,220,0.4);
        }

        @media (max-width: 380px) {
            .page { font-size: 13px; min-height: 340px; }
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation: none !important; transition: none !important; }
        }
    </style>
</head>
<body>

<div class="blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
</div>

<div class="card">

    <div class="envelope-header">
        <div class="wax-seal">🌷</div>
        <span class="envelope-title">จดหมายถึงคนน่ารัก</span>
    </div>

    <div class="notebook">
        <div class="rings" id="rings"></div>
        <div class="pages" id="pages"></div>
    </div>

    <div class="nav">
        <button class="nav-btn" id="prevBtn" onclick="changePage(-1)" disabled>←</button>
        <div class="page-dots" id="dots"></div>
        <button class="nav-btn" id="nextBtn" onclick="changePage(1)">→</button>
    </div>

    <button class="link-btn" onclick="location.href='../menu.html'">กลับหน้าเมนู</button>

</div>

<script>
    const toText   = "ถึงคนของเค้า 💌";
    const fromText = "จากคนที่รักเธอ 🌷";
    const stickers = ["🌸","✨","🎀","💕","🌼","⭐","🍬","🌻"];

    const letter = `ขอบคุณที่เข้ามาในชีวิตเค้านะ ตั้งแต่มีเธอ ทุกวันมันก็ดูพิเศษขึ้นมาเลย บางวันอาจจะมีเรื่องเครียด มีเรื่องเหนื่อย หรือมีอะไรที่ทำให้เราไม่สบายใจ แต่แค่หันมาเจอเธอ มันก็เหมือนทุกอย่างเบาลงทันที เค้าอาจจะไม่ได้เป็นคนที่เก่งที่สุด อาจจะมีงอแง มีงี่เง่า มีเอาแต่ใจบ้างในบางครั้ง แต่สิ่งหนึ่งที่เค้ารู้แน่ ๆ คือเค้ารักเธอมากจริง ๆ

ขอบคุณที่อยู่ข้าง ๆ กัน ขอบคุณที่ไม่ทิ้งกันไปไหน และขอบคุณที่ทำให้คำว่า "ธรรมดา" กลายเป็นวันที่มีความหมายขึ้นมา ไม่ว่าจะเกิดอะไรขึ้นในอนาคต เค้าก็ยังอยากมีเธออยู่ตรงนี้เสมอ และจะพยายามเป็นคนที่ดีขึ้น เพื่อเธอ เพื่อเรา และเพื่อความรักของเรา`;

    const lines = letter.split("\n").filter(l => l.trim() !== "");
    const totalPages = lines.length;
    let current = 0;

    const ringsEl = document.getElementById("rings");
    for (let i = 0; i < 9; i++) {
        const r = document.createElement("div"); r.className = "ring";
        ringsEl.appendChild(r);
    }

    const dotsEl = document.getElementById("dots");
    for (let i = 0; i < totalPages; i++) {
        const d = document.createElement("div");
        d.className = "dot" + (i === 0 ? " active-dot" : "");
        d.id = "dot-" + i;
        dotsEl.appendChild(d);
    }

    const pagesEl = document.getElementById("pages");
    lines.forEach((line, idx) => {
        const div = document.createElement("div");
        div.className = "page" + (idx === 0 ? " active" : "");
        div.id = "page-" + idx;

        const s1 = stickers[idx % stickers.length];
        const s2 = stickers[(idx + 3) % stickers.length];

        let html = `<span class="sticker sticker-tl">${s1}</span>`;
        if (idx === 0) html += `<div class="to-label">${toText}</div>`;
        html += `<div class="page-text">${line}</div>`;
        if (idx === totalPages - 1) {
            html += `<div class="from-wrap"><span class="from-label">${fromText}</span></div>`;
            html += `<span class="sticker sticker-br">${s2}</span>`;
        }
        html += `<div class="page-num">${idx + 1} / ${totalPages}</div>`;
        div.innerHTML = html;
        pagesEl.appendChild(div);
    });

    function updateUI() {
        document.getElementById("prevBtn").disabled = current === 0;
        document.getElementById("nextBtn").disabled = current === totalPages - 1;
        document.querySelectorAll(".dot").forEach((d, i) => {
            d.classList.toggle("active-dot", i === current);
        });
    }

    function changePage(dir) {
        const oldPage = document.getElementById("page-" + current);
        current += dir;
        const newPage = document.getElementById("page-" + current);
        oldPage.classList.remove("active");
        newPage.classList.remove("flip-right", "flip-left");
        void newPage.offsetWidth;
        newPage.classList.add("active", dir > 0 ? "flip-right" : "flip-left");
        updateUI();
    }

    updateUI();
</script>
</body>
</html>
