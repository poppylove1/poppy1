<!-- menu 1 ( เค้กวันเกิดนับวันเดือนปี ชั่วโมงนาทีวินาที ) -->

<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyLoveweb</title>

    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Mali', cursive;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg,
                    #FFB3D1,
                    #BFE7FF,
                    #E2C6FF);
            color: #5A4B6E;
            padding: 24px 0;
        }

        .card {
            width: 90%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 28px;
            padding: 28px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .title {
            font-size: 22px;
            margin-bottom: 6px;
        }

        .subtitle {
            letter-spacing: 0.2px;
            line-height: 1.8;
            font-size: 14px;
            opacity: 0.65;
            margin-bottom: 20px;
        }

        .cake-wrap {
            margin: 0 auto 18px;
            width: 200px;
            height: 180px;
            position: relative;
        }

        .cake-svg {
            width: 100%;
            height: 100%;
        }

        .sparkle-emoji {
            position: absolute;
            font-size: 16px;
            color: #FFD966;
            animation: twinkle 2s infinite ease-in-out;
        }

        .sp-1 { top: 5px; left: 20px; animation-delay: 0s; }
        .sp-2 { top: 30px; right: 15px; animation-delay: 0.6s; font-size: 14px; }
        .sp-3 { bottom: 50px; left: 10px; animation-delay: 1.2s; font-size: 12px; color: #FFB3D1; }
        .sp-4 { top: 60px; right: 30px; animation-delay: 1.5s; font-size: 13px; color: #C9B0FF; }

        @keyframes twinkle {
            0%, 100% { opacity: 0.4; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.15); }
        }

        .year-box {
            background: linear-gradient(135deg,
                    rgba(255, 179, 209, 0.25),
                    rgba(226, 198, 255, 0.3));
            border: 2px dashed rgba(139, 123, 175, 0.35);
            border-radius: 20px;
            padding: 18px 16px;
            margin-bottom: 16px;
        }

        .year-label { font-size: 13px; opacity: 0.7; margin-bottom: 4px; }
        .year-number { font-size: 38px; font-weight: 600; color: #8B7BAF; line-height: 1.1; }
        .year-unit { font-size: 14px; opacity: 0.8; margin-top: 2px; }

        .counter-box {
            background: rgba(255, 255, 255, 0.7);
            border-radius: 18px;
            padding: 16px 12px;
            margin-bottom: 18px;
            box-shadow: inset 0 0 0 1px rgba(139, 123, 175, 0.1);
        }

        .counter-title { font-size: 13px; opacity: 0.65; margin-bottom: 12px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .time-box {
            background: #fff;
            padding: 10px 6px;
            border-radius: 12px;
            box-shadow: 0 2px 6px rgba(139, 123, 175, 0.12);
        }

        .time-box h3 { font-size: 18px; font-weight: 600; color: #8B7BAF; line-height: 1.1; }
        .time-box p { font-size: 11px; opacity: 0.65; margin-top: 3px; }

        .sweet-msg {
            font-size: 14px;
            line-height: 1.8;
            padding: 14px 16px;
            background: linear-gradient(135deg,
                    rgba(255, 179, 209, 0.18),
                    rgba(226, 198, 255, 0.22));
            border-radius: 14px;
            margin-bottom: 18px;
        }

        .birthday-message {
            display: none;
            background: linear-gradient(135deg,
                    rgba(255, 217, 102, 0.25),
                    rgba(255, 179, 209, 0.3));
            border: 2px dashed rgba(255, 140, 0, 0.35);
            border-radius: 20px;
            padding: 26px 18px;
            margin-bottom: 18px;
            animation: bdayPop 1.6s ease-in-out infinite;
        }

        .bday-emoji {
            font-size: 34px;
            margin-bottom: 6px;
        }

        .bday-text {
            font-size: 26px;
            font-weight: 600;
            color: #E8709A;
            margin-bottom: 6px;
        }

        .bday-sub {
            font-size: 14px;
            opacity: 0.75;
            line-height: 1.7;
        }

        @keyframes bdayPop {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.04); }
        }

        .btn {
            background-color: #8B7BAF;
            color: #FFFFFF;
            border: none;
            padding: 10px 22px;
            border-radius: 999px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(139, 123, 175, 0.35);
            transition: all 0.25s ease;
            font-family: 'Mali', cursive;
        }

        .btn:hover {
            background-color: #7A6AA0;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(139, 123, 175, 0.45);
        }

        .confetti-wrap {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .confetti {
            position: absolute;
            top: -20px;
            font-size: 14px;
            opacity: 0;
            animation: confettiFall linear infinite;
        }

        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        @keyframes flicker {
            0%, 100% { transform: scale(1) rotate(-1deg); }
            50% { transform: scale(0.93, 1.06) rotate(1deg) translateY(-1px); }
        }

        @media (max-width: 360px) {
            .card { padding: 22px 12px; }
            .cake-wrap { width: 150px; height: 140px; }
            .year-number { font-size: 28px; }
            .counter-box { padding: 10px 6px; overflow: hidden; }
            .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 6px; }
            .time-box { padding: 8px 4px; min-width: 0; }
            .time-box h3 { font-size: clamp(11px, 3.5vw, 14px); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
            .time-box p { font-size: 10px; }
            .bday-text { font-size: 20px; }
            .bday-emoji { font-size: 26px; }
        }

        @media (min-width: 361px) and (max-width: 480px) {
            .card { padding: 24px 14px; }
            .cake-wrap { width: 170px; height: 150px; }
            .year-number { font-size: 32px; }
            .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .time-box h3 { font-size: clamp(12px, 3.5vw, 16px); }
        }

        @media (min-width: 481px) and (max-width: 599px) {
            .card { max-width: 440px; }
            .cake-wrap { width: 180px; height: 160px; }
            .year-number { font-size: 34px; }
        }

        @media (min-width: 600px) and (max-width: 1024px) {
            .card { max-width: 460px; }
            .cake-wrap { width: 190px; height: 170px; }
        }

        @media (orientation: landscape) and (max-height: 420px) {
            body { align-items: flex-start; padding: 10px 0; }
            .cake-wrap { width: 140px; height: 120px; }
        }

        @media (prefers-reduced-motion: reduce) {
            * { animation: none !important; transition: none !important; }
        }

        @media (max-width: 430px) { .card { width: 92%; } }

        @supports (padding: env(safe-area-inset-left)) {
            body {
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
            }
        }
    </style>
</head>

    <script>
        const birthDate = new Date("2008-07-01T09:32:50");
        const birthMonth = birthDate.getMonth();
        const birthDay = birthDate.getDate();

        const yearBoxEl = document.getElementById("yearBox");
        const counterBoxEl = document.getElementById("counterBox");
        const birthdayMessageEl = document.getElementById("birthdayMessage");
        const pageSubtitleEl = document.getElementById("pageSubtitle");

        function isBirthdayToday(now) {
            return now.getMonth() === birthMonth && now.getDate() === birthDay;
        }

        function getNextBirthday(now) {
            let year = now.getFullYear();
            let next = new Date(year, birthMonth, birthDay, 0, 0, 0);
            if (next <= now) {
                next = new Date(year + 1, birthMonth, birthDay, 0, 0, 0);
            }
            return next;
        }

        function showBirthdayCelebration() {
            yearBoxEl.style.display = "none";
            counterBoxEl.style.display = "none";
            birthdayMessageEl.style.display = "block";
            pageSubtitleEl.innerText = "วันนี้แหละ วันเกิดของเธอ!";
        }

        function hideBirthdayCelebration() {
            yearBoxEl.style.display = "block";
            counterBoxEl.style.display = "block";
            birthdayMessageEl.style.display = "none";
            pageSubtitleEl.innerText = "อีกไม่กี่วันก็จะถึงวันพิเศษของเธอแล้วนะ";
        }

        function updateCounter() {
            const now = new Date();

            if (isBirthdayToday(now)) {
                showBirthdayCelebration();
                return;
            }

            hideBirthdayCelebration();

            const next = getNextBirthday(now);
            const ageTurning = next.getFullYear() - birthDate.getFullYear();
            document.getElementById("years").innerText = ageTurning.toLocaleString('th-TH');

            const diff = next - now;
            const totalSec = Math.max(0, Math.floor(diff / 1000));
            const days = Math.floor(totalSec / 86400);
            const hours = Math.floor((totalSec % 86400) / 3600);
            const minutes = Math.floor((totalSec % 3600) / 60);
            const seconds = totalSec % 60;

            document.getElementById("days").innerText = days.toLocaleString('th-TH');
            document.getElementById("hours").innerText = hours.toLocaleString('th-TH');
            document.getElementById("minutes").innerText = minutes.toLocaleString('th-TH');
            document.getElementById("seconds").innerText = seconds.toLocaleString('th-TH');
        }

        updateCounter();
        setInterval(updateCounter, 1000);

        function makeConfetti() {
            const wrap = document.getElementById("confettiWrap");
            const symbols = ["✦", "✧", "✿", "❀", "♡", "✽"];
            const colors = ["#FFB3D1", "#FF8FAB", "#E2C6FF", "#C9B0FF", "#BFE7FF", "#FFD966"];

            for (let i = 0; i < 18; i++) {
                const c = document.createElement("div");
                c.className = "confetti";
                c.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                c.style.color = colors[Math.floor(Math.random() * colors.length)];
                c.style.left = (Math.random() * 100) + "%";
                c.style.fontSize = (12 + Math.random() * 10) + "px";
                c.style.animationDuration = (6 + Math.random() * 6) + "s";
                c.style.animationDelay = (Math.random() * 8) + "s";
                wrap.appendChild(c);
            }
        }
        makeConfetti();
    </script>
