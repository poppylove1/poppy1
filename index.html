<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyLoveweb</title>

    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Mali', cursive;
        }

        html,
        body {
            height: 100%;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(160deg, #FFE8F3 0%, #EDE0FF 50%, #DDF0FF 100%);
            overflow: hidden;
            position: relative;
            padding: 16px;
        }

        .balloon-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .balloon {
            position: absolute;
            opacity: 0;
            width: clamp(34px, 9vw, 95px);
            height: clamp(34px, 9vw, 95px);
            animation: floatBalloon ease-in-out infinite;
        }

        .balloon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        @keyframes floatBalloon {
            0% {
                transform: translateY(0px) rotate(-4deg) scale(1);
                opacity: 0;
            }

            8% {
                opacity: 0.5;
            }

            50% {
                transform: translateY(-16px) rotate(4deg) scale(1.05);
                opacity: 0.45;
            }

            92% {
                opacity: 0.5;
            }

            100% {
                transform: translateY(0px) rotate(-4deg) scale(1);
                opacity: 0;
            }
        }

        .card {
            width: 90%;
            max-width: 340px;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 28px;
            padding: 36px 28px 30px;
            text-align: center;
            box-shadow: 0 12px 40px rgba(139, 123, 175, 0.18);
            border: 1.5px solid rgba(226, 198, 255, 0.55);
            position: relative;
            z-index: 2;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(135deg, #FFB3D1, #C9B0FF);
            color: #6B4A8A;
            font-size: 12px;
            font-weight: 600;
            padding: 5px 16px;
            border-radius: 999px;
            margin-bottom: 18px;
        }

        .heart {
            font-size: 56px;
            line-height: 1;
            display: block;
            margin-bottom: 6px;
            animation: beat 1.5s ease-in-out infinite;
            color: #FF8FAB;
        }

        @keyframes beat {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.13);
            }
        }

        .title {
            font-size: 22px;
            font-weight: 600;
            color: #5A4B6E;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: #9B87B5;
            line-height: 1.9;
            margin-bottom: 26px;
        }

        .btn {
            background: linear-gradient(135deg, #FFB3D1, #C9B0FF);
            color: #5A3A7A;
            border: none;
            padding: 13px 36px;
            border-radius: 999px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Mali', cursive;
            box-shadow: 0 4px 16px rgba(201, 176, 255, 0.45);
            transition: all 0.25s ease;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.04);
            box-shadow: 0 8px 24px rgba(201, 176, 255, 0.55);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .dots {
            display: flex;
            justify-content: center;
            gap: 7px;
            margin-top: 20px;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            animation: pulse 1.8s ease-in-out infinite;
        }

        .dot:nth-child(1) {
            background: #FFB3D1;
            animation-delay: 0s;
        }

        .dot:nth-child(2) {
            background: #C9B0FF;
            animation-delay: 0.3s;
        }

        .dot:nth-child(3) {
            background: #BFE7FF;
            animation-delay: 0.6s;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.6;
            }

            50% {
                transform: scale(1.5);
                opacity: 1;
            }
        }

        @media (max-width: 480px) {
            .balloon {
                animation-duration: 6s !important;
                opacity: 0.5;
            }

            .balloon.thin-only {
                display: none;
            }

            .card {
                padding: 30px 20px 26px;
            }

            .heart {
                font-size: 46px;
            }

            .title {
                font-size: 19px;
            }

            .subtitle {
                font-size: 12.5px;
            }

            .btn {
                font-size: 14px;
                padding: 11px 28px;
            }
        }

        @media (max-width: 360px) {
            .balloon.extra-small-hide {
                display: none;
            }
        }

        @media (orientation: landscape) and (max-height: 420px) {
            body {
                align-items: flex-start;
                overflow-y: auto;
                padding: 16px 0;
            }

            .heart {
                font-size: 36px;
            }

            .card {
                padding: 20px;
            }

            .balloon-layer {
                display: none;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }

        @supports (padding: env(safe-area-inset-left)) {
            body {
                padding-left: max(16px, env(safe-area-inset-left));
                padding-right: max(16px, env(safe-area-inset-right));
            }
        }
    </style>
</head>

<body>

    <div class="balloon-layer">
        <div class="balloon" style="top:3%; left:4%; animation-duration:7s; animation-delay:0s">
            <img src="menu/img/stickers/sk2.png" alt="">
        </div>
        <div class="balloon" style="top:5%; right:4%; animation-duration:8.5s; animation-delay:1.2s">
            <img src="menu/img/stickers/sk4.png" alt="">
        </div>
        <div class="balloon extra-small-hide" style="top:14%; left:38%; animation-duration:9s; animation-delay:2.5s">
            <img src="menu/img/stickers/sk3.png" alt="">
        </div>

        <div class="balloon" style="top:46%; left:2%; animation-duration:9s; animation-delay:2.5s">
            <img src="menu/img/stickers/sk3.png" alt="">
        </div>
        <div class="balloon" style="top:50%; right:2%; animation-duration:7.5s; animation-delay:0.8s">
            <img src="menu/img/stickers/sk2.png" alt="">
        </div>

        <div class="balloon extra-small-hide" style="top:82%; left:6%; animation-duration:10s; animation-delay:3.5s">
            <img src="menu/img/stickers/sk1.png" alt="">
        </div>
        <div class="balloon" style="top:85%; right:6%; animation-duration:8s; animation-delay:4s">
            <img src="menu/img/stickers/sk4.png" alt="">
        </div>
        <div class="balloon thin-only" style="top:88%; left:42%; animation-duration:7.5s; animation-delay:0.8s">
            <img src="menu/img/stickers/sk2.png" alt="">
        </div>

        <div class="balloon thin-only" style="top:22%; left:10%; animation-duration:11s; animation-delay:5s">
            <img src="menu/img/stickers/sk4.png" alt="">
        </div>
        <div class="balloon thin-only" style="top:25%; right:9%; animation-duration:9.5s; animation-delay:1.8s">
            <img src="menu/img/stickers/sk5.png" alt="">
        </div>
        <div class="balloon thin-only" style="top:74%; right:12%; animation-duration:9.5s; animation-delay:1.8s">
            <img src="menu/img/stickers/sk5.png" alt="">
        </div>
    </div>

    <div class="card">
        <div class="badge">✦ สำหรับคนพิเศษ</div>
        <span class="heart">♡</span>
        <div class="title">หวัดดีคั้บอ้วนน~</div>
        <div class="subtitle">
            เค้าทำอะไรบางอย่างไว้ให้เธอด้วย<br>
            พร้อมดูรึยัง ถ้าพร้อมแล้วกดปุ่มเลย ♡
        </div>
        <button class="btn" onclick="location.href='password.html'">♡</button>
        <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

</body>

</html>
