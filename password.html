<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyLoveweb</title>

    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Mali', cursive;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(160deg, #FFE8F3 0%, #EDE0FF 55%, #DDF0FF 100%);
            overflow: hidden;
            position: relative;
        }

        .floatie {
            position: fixed;
            pointer-events: none;
            opacity: 0;
            animation: floatImg ease-in-out infinite;
        }

        .floatie img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        @keyframes floatImg {
            0%   { transform: translateY(0px) rotate(-4deg) scale(1);    opacity: 0;    }
            8%   { opacity: 0.5; }
            50%  { transform: translateY(-18px) rotate(4deg) scale(1.05); opacity: 0.45; }
            92%  { opacity: 0.5; }
            100% { transform: translateY(0px) rotate(-4deg) scale(1);    opacity: 0;    }
        }

        .card {
            width: 90%;
            max-width: 320px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 28px;
            padding: 28px 22px 24px;
            text-align: center;
            box-shadow: 0 12px 40px rgba(139, 123, 175, 0.17);
            border: 1.5px solid rgba(226, 198, 255, 0.6);
            position: relative;
            z-index: 2;
        }

        .shake {
            animation: shake 0.3s;
        }

        @keyframes shake {
            0%   { transform: translateX(0); }
            25%  { transform: translateX(-7px); }
            50%  { transform: translateX(7px); }
            75%  { transform: translateX(-7px); }
            100% { transform: translateX(0); }
        }

        .badge {
            display: inline-block;
            background: linear-gradient(135deg, #FFB3D1, #C9B0FF);
            color: #6B4A8A;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 999px;
            margin-bottom: 14px;
        }

        .card-img {
            width: 110px;
            height: 110px;
            object-fit: contain;
            margin-bottom: 10px;
            animation: imgFloat 3s ease-in-out infinite;
        }

        @keyframes imgFloat {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-7px); }
        }

        .title {
            font-size: 19px;
            font-weight: 600;
            color: #5A4B6E;
            margin-bottom: 3px;
        }

        .hint {
            font-size: 12px;
            color: #B0A0CC;
            margin-bottom: 4px;
        }

        .error {
            font-size: 13px;
            color: #FF8FAB;
            height: 18px;
            margin-bottom: 10px;
        }

        .pin-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 18px;
        }

        .pin-dot {
            width: 42px;
            height: 48px;
            border-radius: 14px;
            background: linear-gradient(135deg, #FFF0F7, #EDE0FF);
            border: 1.5px solid #E2C6FF;
            font-size: 22px;
            color: #8B7BAF;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, transform 0.1s;
        }

        .pin-dot.filled {
            background: linear-gradient(135deg, #FFB3D1, #C9B0FF);
            border-color: #C9B0FF;
            transform: scale(1.06);
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .key {
            background: #fff;
            border-radius: 16px;
            padding: 13px 6px;
            font-size: 20px;
            font-weight: 600;
            color: #5A4B6E;
            cursor: pointer;
            border: 1.5px solid #F0E6FF;
            box-shadow: 0 3px 10px rgba(139, 123, 175, 0.1);
            transition: transform 0.12s, background 0.12s;
            user-select: none;
        }

        .key:hover  { background: #FFF0F7; }
        .key:active { transform: scale(0.93); background: #FFE0EF; }

        .key-del {
            background: linear-gradient(135deg, #FFD6E8, #F4C0D1);
            border-color: #F4C0D1;
            color: #A03060;
            font-size: 15px;
        }

        .key-del:hover { background: linear-gradient(135deg, #FFBCDA, #EDA8C2); }

        .key-confirm {
            background: linear-gradient(135deg, #C9B0FF, #A07FE0);
            border-color: #C9B0FF;
            color: #fff;
            font-size: 14px;
        }

        .key-confirm:hover { background: linear-gradient(135deg, #BBA0F0, #9070D0); }

        @media (max-width: 360px) {
            .card { padding: 22px 14px 20px; }
            .pin-dot { width: 34px; height: 42px; }
            .key { padding: 10px 4px; font-size: 17px; }
        }

        @media (orientation: landscape) and (max-height: 420px) {
            body { align-items: flex-start; overflow-y: auto; padding: 12px 0; }
            .floatie { display: none; }
            .card-img { width: 70px; height: 70px; }
        }

        @media (prefers-reduced-motion: reduce) {
            * { animation: none !important; transition: none !important; }
        }

        @supports (padding: env(safe-area-inset-left)) {
            body {
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
            }
        }
    </style>
</head>

<body>

    <div class="floatie" style="width:90px;height:90px;top:4%;left:3%;animation-duration:7s;animation-delay:0s">
        <img src="menu/img/stickers/sk5.png" alt="">
    </div>
    <div class="floatie" style="width:70px;height:70px;top:8%;right:5%;animation-duration:8.5s;animation-delay:1.2s">
        <img src="menu/img/stickers/sk5.png" alt="">
    </div>
    <div class="floatie" style="width:80px;height:80px;top:50%;left:1%;animation-duration:9s;animation-delay:2.5s">
        <img src="menu/img/stickers/sk5.png" alt="">
    </div>
    <div class="floatie" style="width:64px;height:64px;top:58%;right:3%;animation-duration:7.5s;animation-delay:0.8s">
        <img src="menu/img/stickers/sk5.png" alt="">
    </div>
    <div class="floatie" style="width:55px;height:55px;top:76%;left:15%;animation-duration:10s;animation-delay:3.5s">
        <img src="menu/img/stickers/sk5.png" alt="">
    </div>
    <div class="floatie" style="width:60px;height:60px;top:74%;right:13%;animation-duration:8s;animation-delay:4s">
        <img src="menu/img/stickers/sk5.png" alt="">
    </div>
    <div class="floatie" style="width:50px;height:50px;top:26%;left:7%;animation-duration:11s;animation-delay:5s">
        <img src="menu/img/stickers/sk5.png" alt="">
    </div>
    <div class="floatie" style="width:56px;height:56px;top:28%;right:6%;animation-duration:9.5s;animation-delay:1.8s">
        <img src="menu/img/stickers/sk5.png" alt="">
    </div>

    <div class="card" id="card">
        <div class="badge">✦ ใส่รหัสเพื่อเข้า</div>
        <img class="card-img" src="menu/img/stickers/sk6.png" alt="heart">
        <div class="title">กรอกรหัสผ่าน</div>
        <div class="hint">คำใบ้ : 123456</div>
        <div class="error" id="errMsg"></div>

        <div class="pin-row" id="pinRow">
            <div class="pin-dot"></div>
            <div class="pin-dot"></div>
            <div class="pin-dot"></div>
            <div class="pin-dot"></div>
            <div class="pin-dot"></div>
            <div class="pin-dot"></div>
        </div>

        <div class="keypad">
            <div class="key" onclick="addNum('1')">1</div>
            <div class="key" onclick="addNum('2')">2</div>
            <div class="key" onclick="addNum('3')">3</div>
            <div class="key" onclick="addNum('4')">4</div>
            <div class="key" onclick="addNum('5')">5</div>
            <div class="key" onclick="addNum('6')">6</div>
            <div class="key" onclick="addNum('7')">7</div>
            <div class="key" onclick="addNum('8')">8</div>
            <div class="key" onclick="addNum('9')">9</div>
            <div class="key key-del" onclick="delNum()">ลบ ✕</div>
            <div class="key" onclick="addNum('0')">0</div>
            <div class="key key-confirm" onclick="checkPass()">ยืนยัน ♡</div>
        </div>
    </div>

    <script>
        let input = "";
        // รหัสแก้ตรงนี้
        const correct = "123456";

        function updateUI() {
            document.querySelectorAll('.pin-dot').forEach((d, i) => {
                if (input[i]) {
                    d.textContent = '•';
                    d.classList.add('filled');
                } else {
                    d.textContent = '';
                    d.classList.remove('filled');
                }
            });
        }

        function addNum(n) {
            if (input.length < 6) { input += n; updateUI(); }
        }

        function delNum() {
            input = input.slice(0, -1);
            updateUI();
        }

        function shake() {
            const c = document.getElementById('card');
            c.classList.add('shake');
            setTimeout(() => c.classList.remove('shake'), 320);
        }

        function showErr(msg) {
            const e = document.getElementById('errMsg');
            e.textContent = msg;
            shake();
            setTimeout(() => e.textContent = '', 2200);
        }

        function checkPass() {
            if (input.length < 6) { showErr('กรอกรหัสไม่ครบนะ ~'); return; }
            if (input === correct) {
                window.location.href = "menu.html";
            } else {
                showErr('รหัสไม่ถูกต้อง ลองใหม่นะ ♡');
                input = '';
                updateUI();
            }
        }
    </script>

</body>

</html>
