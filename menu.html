<!-- 3 menu ( หน้าเลือกเมนูสามารถเลือกลิ้งได้ว่าจะลิ้งไปไฟล์ไหน ) -->

<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyLoveweb</title>

    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Mali', cursive;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg,
                    #FFB3D1,
                    #BFE7FF,
                    #E2C6FF);
        }

        .card {
            width: 90%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 24px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(10px);
            padding: 30px 25px;
            text-align: center;
        }

        .title {
            font-size: 24px;
            color: #5A4B6E;
            margin-bottom: 25px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .menu-item {
            background: #ffffff;
            border-radius: 18px;
            padding: 18px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.25s ease;
        }

        .menu-item:hover {
            transform: translateY(-6px) scale(1.03);
            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.15);
        }

        .menu-item img {
            width: 90px;
            margin-bottom: 12px;
        }

        .menu-text {
            font-size: 15px;
            color: #5A4B6E;
        }

        .btn {
            margin-top: 30px;
            background-color: #8B7BAF;
            color: #FFFFFF;
            border: none;
            padding: 10px 22px;
            border-radius: 999px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(139, 123, 175, 0.35);
            transition: all 0.25s ease;
        }

        .btn:hover {
            background-color: #7A6AA0;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(139, 123, 175, 0.45);
        }

        @media (min-width: 361px) and (max-width: 480px) {
            body {
                padding: 16px 0;
                align-items: center;
            }

            .card {
                max-height: 92vh;
                overflow-y: auto;
                padding: 24px 18px;
            }

            .menu-grid {
                gap: 14px;
            }

            .menu-item img {
                width: 70px;
            }

            .menu-text {
                font-size: 14px;
            }
        }

        @media (min-width: 481px) and (max-width: 599px) {
            .card {
                max-height: 94vh;
                overflow-y: auto;
            }

            .menu-item img {
                width: 80px;
            }
        }

        @media (max-width: 360px) {
            body {
                padding: 12px 0;
                align-items: center;
            }

            .card {
                max-height: 92vh;
                overflow-y: auto;
                padding: 20px 14px;
            }

            .title {
                font-size: 20px;
                margin-bottom: 16px;
            }

            .menu-grid {
                gap: 10px;
            }

            .menu-item {
                padding: 12px;
            }

            .menu-item img {
                width: 60px;
            }

            .menu-text {
                font-size: 13px;
            }
        }
        
        @media (min-width: 600px) and (max-width: 1024px) {
            .card {
                max-height: 95vh;
                overflow-y: auto;
            }

            .menu-item img {
                width: 85px;
            }
        }

        @media (max-width: 430px) {
            .card {
                width: 92%;
            }
        }

        @media (orientation: landscape) and (max-height: 420px) {
            body {
                align-items: center;
                padding: 10px 0;
            }

            .card {
                max-height: 90vh;
                overflow-y: auto;
                padding: 14px;
            }

            .title {
                font-size: 18px;
                margin-bottom: 12px;
            }

            .menu-grid {
                gap: 8px;
            }

            .menu-item {
                padding: 10px;
            }

            .menu-item img {
                width: 55px;
            }

            .menu-text {
                font-size: 12px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                transition: none !important;
            }
        }

        @supports (padding: env(safe-area-inset-left)) {
            body {
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="title">แฮะๆ ลองเปิดดูสิ ^^</div>

        <div class="menu-grid">

            <div class="menu-item" onclick="go('menu/msg.html')">
                <img src="menu/img/stickers/skmenu1.png">
                <div class="menu-text">ข้อความถึง<br>คนน่ารัก</div>
            </div>

            <div class="menu-item" onclick="go('menu/memory-v2.html')">
                <img src="menu/img/stickers/skmenu2.png">
                <div class="menu-text">ความทรงจำ</div>
            </div>

            <div class="menu-item" onclick="go('menu/hbd.html')">
                <img src="menu/img/stickers/skmenu6.png">
                <div class="menu-text">วันเกิดเธอ</div>
            </div>

            <div class="menu-item" onclick="go('menu/music.html')">
                <img src="menu/img/stickers/skmenu4.png">
                <div class="menu-text">ฟังเพลงโปรดของเรากัน<br></div>
            </div>
            
        </div>

    </div>

    <script>
        function go(page) {
            window.location.href = page;
        }
    </script>

</body>

</html>
